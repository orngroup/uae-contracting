.login-box{background:rgba(255,255,255,0.13);backdrop-filter:blur(18px);border:1px solid rgba(255,255,255,0.25);border-radius:16px;padding:36px 32px;display:flex;flex-direction:column;align-items:center;gap:14px;min-width:280px}
.login h1{font-size:22px;font-weight:700;color:#fff;text-align:center}
.login p{font-size:13px;color:rgba(255,255,255,0.7);text-align:center}
.login-sub{font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:rgba(255,255,255,.55)}
.user-btn{padding:10px 20px;border:1px solid rgba(255,255,255,.3);border-radius:8px;background:rgba(255,255,255,.15);color:#fff;cursor:pointer;font-size:13px;display:flex;align-items:center;gap:10px;width:240px;font-family:inherit;font-weight:500;transition:all .15s}
.user-btn:hover{background:rgba(255,255,255,.28)}
.av-lg{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex:0 0 auto}
.topbar{background:#1F4E79;padding:0 20px;display:flex;align-items:center;height:52px;position:sticky;top:0;z-index:200}
.logo{font-size:15px;font-weight:700;color:#fff;white-space:nowrap;margin-right:20px}
.logo span{color:#7EC8F0;font-weight:400}
.nav-btn{padding:0 16px;height:52px;border:none;background:none;color:rgba(255,255,255,.7);cursor:pointer;font-size:13px;font-family:inherit;font-weight:500;border-bottom:3px solid transparent;transition:all .15s}
.nav-btn:hover{color:#fff;background:rgba(255,255,255,.08)}
.nav-btn.active{color:#fff;border-bottom-color:#7EC8F0}
.tbr{margin-left:auto;display:flex;align-items:center;gap:12px}
.av-sm{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}
.fbs{font-size:11px;color:rgba(255,255,255,.6);display:flex;align-items:center;gap:5px}
.dot{width:7px;height:7px;border-radius:50%;background:#4ade80;display:inline-block}
.dot.red{background:#f87171}
.lout{background:none;border:1px solid rgba(255,255,255,.3);border-radius:6px;padding:4px 10px;color:rgba(255,255,255,.7);cursor:pointer;font-size:12px;font-family:inherit}
.page{display:none;padding:20px}
.page.active{display:block}
.dash-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:18px}
.mc{background:#fff;border-radius:10px;padding:16px 18px;border:1px solid #e8e8e8}
.mc .lbl{font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:#888;margin-bottom:5px}
.mc .val{font-size:28px;font-weight:700}
.mc .sub{font-size:11px;color:#aaa;margin-top:2px}
.dr{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.card{background:#fff;border-radius:10px;padding:18px 20px;border:1px solid #e8e8e8}
.st{font-size:13px;font-weight:700;color:#1F4E79;margin-bottom:10px;padding-bottom:7px;border-bottom:2px solid #e8e8e8}
.pb{display:flex;gap:2px;height:10px;border-radius:5px;overflow:hidden;margin-bottom:10px}
.ps{height:100%}
.pl{display:flex;flex-direction:column;gap:7px}
.pi{display:flex;align-items:center;font-size:12px}
.sd{width:10px;height:10px;border-radius:50%;flex:0 0 auto;margin-right:8px}
.sn{flex:1;color:#444}
.sc{font-weight:600;background:#f5f5f5;padding:1px 8px;border-radius:10px;font-size:11px}
.tg{display:flex;flex-direction:column;gap:9px}
.tr2{display:flex;align-items:center;gap:10px;font-size:12px}
.tav{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex:0 0 auto}
.tn{flex:1;color:#444}
.tc{font-weight:600;min-width:20px}
.tbw{flex:2;background:#f0f0f0;border-radius:4px;height:6px}
.tb{height:6px;border-radius:4px;background:#1F4E79}
.eg{display:flex;flex-direction:column;gap:9px}
.er{display:flex;align-items:center;gap:10px;font-size:12px}
.en{width:110px;color:#444}
.ebw{flex:1;background:#f0f0f0;border-radius:4px;height:6px}
.eb{height:6px;border-radius:4px;background:#2E75B6}
.ec{font-weight:600;min-width:24px;text-align:right}
.cg{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:8px}
.cp{background:#f5f7fa;border:1px solid #e8e8e8;border-radius:8px;padding:10px 12px}
.cn{font-weight:600;color:#1F4E79;font-size:11px;margin-bottom:2px}
.cv{font-size:20px;font-weight:700}
.tctrl{display:flex;gap:8px;flex-wrap:wrap;align-items:center;padding:12px 20px;background:#fff;border-bottom:1px solid #e8e8e8;position:sticky;top:52px;z-index:100}
.sw{position:relative;flex:1;min-width:140px;max-width:240px}
.sw input{width:100%;padding:6px 10px 6px 28px;border:1px solid #ddd;border-radius:7px;font-size:12px;background:#f9f9f9}
.sw input:focus{outline:none;border-color:#1F4E79;background:#fff}
.si{position:absolute;left:8px;top:50%;transform:translateY(-50%);color:#aaa;font-size:12px}
.fs{padding:6px 10px;border:1px solid #ddd;border-radius:7px;font-size:12px;background:#f9f9f9;cursor:pointer}
.fs:focus{outline:none;border-color:#1F4E79}
.ss{display:flex;gap:5px;padding:7px 20px;background:#f8fafc;border-bottom:1px solid #e8e8e8;flex-wrap:wrap}
.sc2{background:#fff;border:1px solid #e8e8e8;border-radius:6px;padding:3px 9px;font-size:11px;color:#666}
.sc2 strong{color:#1a1a1a;font-weight:600}
.tw{overflow-x:auto;padding:0 20px 40px}
table{width:100%;border-collapse:collapse;font-size:12px;background:#fff;border-radius:10px;overflow:hidden;border:1px solid #e8e8e8;margin-top:12px;table-layout:fixed}
th{text-align:left;padding:8px 8px;color:#888;font-weight:600;font-size:10px;text-transform:uppercase;letter-spacing:.04em;border-bottom:1px solid #e8e8e8;background:#fafafa;white-space:nowrap}
td{padding:7px 8px;border-bottom:1px solid #f0f0f0;vertical-align:top;word-wrap:break-word}
tr:hover td{background:#f9fbfe}
tr.editing td{background:#EEF5FF!important}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}

var db=null,stor=null,CU=null,ALL=[],FILT=[],EID=null,ED={},fbOk=false;

function initFB(){
  try{
    if(!firebase.apps.length) firebase.initializeApp(FC);
    db=firebase.firestore();
    stor=firebase.storage();
    setFb(true);
  }catch(e){setFb(false);}
}
function setFb(ok){
  fbOk=ok;
  document.getElementById('fbDot').className='dot'+(ok?'':' red');
  document.getElementById('fbLbl').textContent=ok?'Live':'Offline';
}
function login(name,i,bg,c){
  CU=name;
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('mainApp').style.display='block';
  var u=USERS[name];
  document.getElementById('cusr').innerHTML='<div class="av-sm" style="background:'+u.bg+';color:'+u.c+'">'+u.i+'</div><span style="font-size:12px;color:rgba(255,255,255,.8)">'+name+'</span>';
  loadData();
}
function logout(){
  CU=null;ALL=[];FILT=[];EID=null;ED={};
  document.getElementById('loginScreen').style.display='flex';
  document.getElementById('mainApp').style.display='none';
}
function showPage(p){
  document.querySelectorAll('.page').forEach(function(el){el.classList.remove('active');});
  document.querySelectorAll('.nav-btn').forEach(function(el){el.classList.remove('active');});
  document.getElementById('page'+p).classList.add('active');
  document.getElementById('nav'+p).classList.add('active');
  if(p==='Dash') renderDash();
}
async function loadData(){
  document.getElementById('tBody').innerHTML='<tr><td colspan="12" class="empty">Loading from Firebase...</td></tr>';
  if(!db){loadSeed();return;}
  try{
    var snap=await db.collection('hotels').orderBy('No').get();
    if(snap.empty){await seedFB();}
    else{
      ALL=snap.docs.map(function(d){var o={id:d.id};Object.assign(o,d.data());return o;});
      applyFilters();renderDash();
    }
  }catch(e){setFb(false);loadSeed();}
}
async function seedFB(){
  notify('Seeding 53 hotels...');
  var batch=db.batch();
  SEED.forEach(function(h){
    var ref=db.collection('hotels').doc('h'+h.No.toString().padStart(2,'0'));
    var obj={};Object.assign(obj,h,{_by:'',_at:''});
    batch.set(ref,obj);
  });
  await batch.commit();
  await loadData();
}
function loadSeed(){
  ALL=SEED.map(function(h){var o={id:'h'+h.No.toString().padStart(2,'0')};Object.assign(o,h);return o;});
  applyFilters();renderDash();
}
function gv(id){var el=document.getElementById(id);return el?el.value:'';}
function applyFilters(){
  var q=gv('srch').toLowerCase();
  var em=gv('fEm');var st=gv('fSt');var al=gv('fAl');var api=gv('fApi');
  FILT=ALL.filter(function(h){
    if(q&&JSON.stringify(h).toLowerCase().indexOf(q)===-1)return false;
    if(em&&h.Emirate!==em)return false;
    if(st&&h.CRM_Status!==st)return false;
    if(al==='__u'&&h.Allocated_To)return false;
    if(al&&al!=='__u'&&h.Allocated_To!==al)return false;
    if(api&&h.Source!==api)return false;
    return true;
  });
  renderStats();renderTable();
}
function renderDash(){
  if(!ALL.length)return;
  var tot=ALL.length;
  var con=ALL.filter(function(h){return h.CRM_Status==='Contracted';}).length;
  var mtg=ALL.filter(function(h){return h.CRM_Status==='Meeting held'||h.CRM_Status==='Meeting booked';}).length;
  var alc=ALL.filter(function(h){return h.Allocated_To;}).length;
  var awt=ALL.filter(function(h){return h.CRM_Status==='Awaiting rates';}).length;
  document.getElementById('mCards').innerHTML=
    mc('Total Hotels',tot,'in database','#1F4E79')+
    mc('Contracted',con,'signed','#166534')+
    mc('Meetings',mtg,'booked or held','#1e40af')+
    mc('Awaiting Rates',awt,'pending','#854d0e')+
    mc('Unallocated',tot-alc,'not assigned','#9d174d');
  var pc={};STATUSES.forEach(function(s){pc[s]=0;});
  ALL.forEach(function(h){if(pc[h.CRM_Status]!==undefined)pc[h.CRM_Status]++;});
  document.getElementById('pBar').innerHTML=STATUSES.map(function(s,i){
    return '<div class="ps" style="width:'+((pc[s]/tot)*100).toFixed(1)+'%;background:'+PCOLS[i]+'"></div>';
  }).join('');
  document.getElementById('pList').innerHTML=STATUSES.map(function(s,i){
    return '<div class="pi"><span class="sd" style="background:'+PCOLS[i]+'"></span><span class="sn">'+s+'</span><span class="sc">'+pc[s]+'</span></div>';
  }).join('');
  var tc={};Object.keys(USERS).forEach(function(u){tc[u]=0;});
  ALL.forEach(function(h){if(h.Allocated_To&&tc[h.Allocated_To]!==undefined)tc[h.Allocated_To]++;});
  var mx=Math.max.apply(null,Object.values(tc).concat([1]));
  document.getElementById('tGrid').innerHTML=Object.keys(USERS).map(function(name){
    var u=USERS[name];var pct=(tc[name]/mx*100).toFixed(0);
    return '<div class="tr2"><div class="tav" style="background:'+u.bg+';color:'+u.c+'">'+u.i+'</div><div class="tn">'+name+'</div><div class="tc">'+tc[name]+'</div><div class="tbw"><div class="tb" style="width:'+pct+'%"></div></div></div>';
  }).join('');
  var ec={};ALL.forEach(function(h){ec[h.Emirate]=(ec[h.Emirate]||0)+1;});
  var mxe=Math.max.apply(null,Object.values(ec).concat([1]));
  document.getElementById('eGrid').innerHTML=Object.keys(ec).sort(function(a,b){return ec[b]-ec[a];}).map(function(e){
    return '<div class="er"><div class="en">'+(e||'?')+'</div><div class="ebw"><div class="eb" style="width:'+((ec[e]/mxe)*100).toFixed(0)+'%"></div></div><div class="ec">'+ec[e]+'</div></div>';
  }).join('');
  var cc={};ALL.forEach(function(h){
    var b=h.Brand||'Other';
    if(b.indexOf('Marriott')>-1||b.indexOf('Ritz')>-1||b.indexOf('W Hotels')>-1||b.indexOf('St. Regis')>-1||b.indexOf('Sheraton')>-1)b="Marriott";
    else if(b.indexOf('Hilton')>-1||b.indexOf('WA')>-1||b.indexOf('Conrad')>-1||b.indexOf('DoubleTree')>-1)b='Hilton';
    else if(b.indexOf('Accor')>-1||b.indexOf('Sofitel')>-1||b.indexOf('Fairmont')>-1||b.indexOf('Movenpick')>-1||b.indexOf('Rixos')>-1)b='Accor';
    else if(b.indexOf('Jumeirah')>-1)b='Jumeirah';
    else if(b.indexOf('IHG')>-1)b='IHG';
    else if(b.indexOf('Kerzner')>-1||b.indexOf('Atlantis')>-1)b='Kerzner';
    else if(b.indexOf('Emaar')>-1)b='Emaar';
    else if(b.indexOf('Four Seasons')>-1)b='Four Seasons';
    else if(b.indexOf('Minor')>-1||b.indexOf('Anantara')>-1)b='Minor Hotels';
    else if(b.indexOf('Mandarin')>-1)b='MO';
    cc[b]=(cc[b]||0)+1;
  });
  document.getElementById('cGrid').innerHTML=Object.keys(cc).sort(function(a,b){return cc[b]-cc[a];}).map(function(c){
    return '<div class="cp"><div class="cn">'+c+'</div><div class="cv">'+cc[c]+'</div></div>';
  }).join('');
}

}
function renderStats(){
  var h='<div class="sc2"><strong>'+FILT.length+'</strong> of <strong>'+ALL.length+'</strong></div>';

    var n=FILT.filter(function(x){return x.CRM_Status===s;}).length;

  var gmc=ED.GM_Card_URL?'<img src="'+ED.GM_Card_URL+'" class="ct" onclick="openModal(\''+ED.GM_Card_URL+'\',\'GM Card\')"><button class="cbtn" style="font-size:10px;padding:1px 5px;margin-top:2px;display:inline;width:auto" onclick="removeCard(\'GM\')">Remove</button>':'<div class="ua" onclick="trigUpload(\''+x.id+'\',\'GM\')">&#128197; GM Card</div>';
  var dsc=ED.DOS_Card_URL?'<img src="'+ED.DOS_Card_URL+'" class="ct" onclick="openModal(\''+ED.DOS_Card_URL+'\',\'DOS Card\')"><button class="cbtn" style="font-size:10px;padding:1px 5px;margin-top:2px;display:inline;width:auto" onclick="removeCard(\'DOS\')">Remove</button>':'<div class="ua" onclick="trigUpload(\''+x.id+'\',\'DOS\')">&#128197; DOS Card</div>';
  var ctc=ED.Contract_URL?'<a href="'+ED.Contract_URL+'" target="_blank" class="link">View Contract</a><button class="cbtn" style="font-size:10px;padding:1px 5px;margin-top:2px;display:inline;width:auto" onclick="removeContract()">Remove</button>':'<div class="ua" onclick="trigContract(\''+x.id+'\')">&#128196; Upload Contract</div>';
  var apiField=ED.Source==='API'?'<input class="ei" value="'+esc(ED.API_Name||'')+'" oninput="ED.API_Name=this.value" placeholder="API name e.g. Amadeus">':'<span class="mu" style="font-size:11px">N/A</span>';
  return '<tr class="editing" id="r'+x.id+'">'+
    '<td style="color:#aaa;font-size:11px">'+x.No+'</td>'+
    '<td><div style="font-weight:700;font-size:12px">'+esc(x.Hotel)+'</div><div style="font-size:10px;color:#aaa">'+esc(x.Brand||'')+'</div></td>'+
    '<td style="font-size:11px">'+esc(x.Emirate||'')+'</td>'+
    '<td><input class="ei" value="'+esc(ED.GM_Name||'')+'" oninput="ED.GM_Name=this.value" placeholder="GM name"><input class="ei" value="'+esc(ED.GM_Email||'')+'" oninput="ED.GM_Email=this.value" placeholder="GM email">'+gmc+'</td>'+
    '<td><input class="ei" value="'+esc(ED.DOS_Name||'')+'" oninput="ED.DOS_Name=this.value" placeholder="DOS name"><input class="ei" value="'+esc(ED.DOS_Email||'')+'" oninput="ED.DOS_Email=this.value" placeholder="DOS email">'+dsc+'</td>'+
    '<td><input class="ei" value="'+esc(ED.Phone||'')+'" oninput="ED.Phone=this.value" placeholder="Phone"></td>'+
    '<td><select class="es" onchange="ED.CRM_Status=this.value;updateRowBadge(\''+x.id+'\')">'+so+'</select></td>'+
    '<td><select class="es" onchange="ED.Allocated_To=this.value;updateRowAlloc(\''+x.id+'\')">'+ao+'</select></td>'+
    '<td><select class="es" onchange="ED.Source=this.value;renderTable()">'+srco+'</select></td>'+
    '<td>'+apiField+'</td>'+
    '<td>'+ctc+'</td>'+
    '<td><button class="sbtn" onclick="saveEdit(\''+x.id+'\')">&#128190; Save</button><button class="cbtn" onclick="cancelEdit()">Cancel</button></td>'+
    '</tr>';
}

function startEdit(id){
  var h=ALL.find(function(x){return x.id===id;});
  if(!h)return;
  EID=id;ED={};Object.assign(ED,h);
  renderTable();
  setTimeout(function(){var r=document.getElementById('r'+id);if(r)r.scrollIntoView({behavior:'smooth',block:'nearest'});},80);
}
function cancelEdit(){EID=null;ED={};renderTable();}

function updateRowBadge(id){}
function updateRowAlloc(id){}

async function saveEdit(id){
  var now=new Date().toISOString().slice(0,10);
  var up={GM_Name:ED.GM_Name||'',GM_Email:ED.GM_Email||'',DOS_Name:ED.DOS_Name||'',DOS_Email:ED.DOS_Email||'',Phone:ED.Phone||'',CRM_Status:ED.CRM_Status||'',Allocated_To:ED.Allocated_To||'',Notes:ED.Notes||'',GM_Card_URL:ED.GM_Card_URL||'',DOS_Card_URL:ED.DOS_Card_URL||'',Source:ED.Source||'Manual',API_Name:ED.API_Name||'',Contract_URL:ED.Contract_URL||'',_by:CU,_at:now};
  var idx=ALL.findIndex(function(x){return x.id===id;});
  if(idx>=0){var merged={};Object.assign(merged,ALL[idx],up);ALL[idx]=merged;}
  EID=null;ED={};
  applyFilters();renderDash();notify('Saved');
  if(db&&fbOk){
    try{await db.collection('hotels').doc(id).update(up);}
    catch(e){notify('Local save OK - Firebase error');setFb(false);}
  }
}

function removeCard(role){ED[role+'_Card_URL']='';renderTable();}
function removeContract(hid){
  if(EID){ED.Contract_URL='';renderTable();return;}
  var idx=ALL.findIndex(function(x){return x.id===hid;});
  if(idx>=0){ALL[idx].Contract_URL='';applyFilters();if(db&&fbOk)db.collection('hotels').doc(hid).update({Contract_URL:''});}
}

function trigUpload(hid,role){
  var inp=document.createElement('input');inp.type='file';inp.accept='image/*';
  inp.onchange=function(e){
    var file=e.target.files[0];if(!file)return;
    notify('Uploading...');
    if(stor&&fbOk){
      stor.ref('cards/'+hid+'_'+role+'_'+Date.now()).put(file).then(function(snap){
        snap.ref.getDownloadURL().then(function(url){
          ED[role+'_Card_URL']=url;renderTable();notify('Card uploaded');
        });
      }).catch(function(){storeLocal(file,role);});
    }else{storeLocal(file,role);}
  };
  inp.click();
}
function trigContract(hid){
  var inp=document.createElement('input');inp.type='file';inp.accept='.pdf,.doc,.docx,image/*';
  inp.onchange=function(e){
    var file=e.target.files[0];if(!file)return;
    notify('Uploading contract...');
    if(stor&&fbOk){
      stor.ref('contracts/'+hid+'_'+Date.now()).put(file).then(function(snap){
        snap.ref.getDownloadURL().then(function(url){
          if(EID===hid){ED.Contract_URL=url;renderTable();}
          else{var idx=ALL.findIndex(function(x){return x.id===hid;});if(idx>=0){ALL[idx].Contract_URL=url;applyFilters();db.collection('hotels').doc(hid).update({Contract_URL:url});}}
          notify('Contract uploaded');
        });
      }).catch(function(err){notify('Upload failed: '+err.message);});
    }else{notify('Firebase storage not connected');}
  };
  inp.click();
}
function storeLocal(file,role){
  var r=new FileReader();r.onload=function(e){ED[role+'_Card_URL']=e.target.result;renderTable();notify('Card saved locally');};r.readAsDataURL(file);
}
function openModal(url,title){
  document.getElementById('mImg').src=url;
  document.getElementById('mTitle').textContent=title;
  document.getElementById('cardModal').classList.add('open');
}
function closeModal(){document.getElementById('cardModal').classList.remove('open');}
document.getElementById('cardModal').addEventListener('click',function(e){if(e.target===this)closeModal();});
function notify(msg){var el=document.getElementById('notify');el.textContent=msg;el.classList.add('show');setTimeout(function(){el.classList.remove('show');},2800);}
initFB();
</script>
</body>
</html>
